<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interview Prep Roadmap</title>
<style>
  :root{
    --bg:#0f1420; --panel:#171d2b; --panel2:#1e2637; --line:#2a3348;
    --text:#e6ebf5; --muted:#93a0b8; --accent:#4f8cff; --accent2:#22c55e;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text);line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  header{position:sticky;top:0;z-index:10;background:rgba(15,20,32,.92);backdrop-filter:blur(8px);
         border-bottom:1px solid var(--line);padding:18px 20px}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px}
  h1{margin:0 0 4px;font-size:22px}
  .sub{color:var(--muted);font-size:13px;margin:0}
  .overall{display:flex;align-items:center;gap:14px;margin-top:14px}
  .pbar{flex:1;height:12px;background:var(--panel2);border-radius:999px;overflow:hidden}
  .pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s}
  .pct{font-variant-numeric:tabular-nums;font-weight:700;min-width:46px;text-align:right}
  .stat{color:var(--muted);font-size:12px;margin-top:6px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  button{font:inherit;color:var(--text);background:var(--panel2);border:1px solid var(--line);
         padding:6px 12px;border-radius:8px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  main{padding:22px 0 60px}
  .section{background:var(--panel);border:1px solid var(--line);border-radius:14px;
           padding:16px 18px;margin:16px 0;box-shadow:var(--shadow)}
  .shead{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .shead h2{font-size:17px;margin:0}
  .goal{color:var(--muted);font-size:13px;margin:4px 0 12px}
  .sprog{font-size:12px;color:var(--muted);white-space:nowrap}
  .minibar{height:6px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:8px 0 14px}
  .minifill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s}
  .item{display:flex;gap:12px;padding:10px;border:1px solid transparent;border-radius:10px}
  .item:hover{background:var(--panel2);border-color:var(--line)}
  .item.done .title{text-decoration:line-through;color:var(--muted)}
  .cb{appearance:none;width:20px;height:20px;border:2px solid var(--line);border-radius:6px;
      cursor:pointer;flex:0 0 auto;margin-top:2px;position:relative}
  .cb:checked{background:var(--accent2);border-color:var(--accent2)}
  .cb:checked::after{content:"✓";position:absolute;top:-2px;left:3px;color:#04210f;font-weight:800}
  .body{flex:1;min-width:0}
  .title{font-weight:600}
  .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:3px;font-size:12px;color:var(--muted)}
  .badge{padding:1px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .b-video{background:#3b1d2b;color:#ff9db6}.b-article{background:#1d2f3b;color:#8fd0ff}
  .b-practice{background:#1d3b28;color:#8bf0b0}.b-course{background:#2f2b3b;color:#c7b6ff}
  .b-repo{background:#3b331d;color:#ffe08a}.b-book{background:#2b2b2b;color:#ddd}
  .note{font-size:12.5px;color:var(--muted);margin-top:3px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px}
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1 id="title">Interview Prep Roadmap</h1>
    <p class="sub" id="subtitle"></p>
    <div class="overall">
      <div class="pbar"><div class="pfill" id="pfill"></div></div>
      <div class="pct" id="pct">0%</div>
    </div>
    <div class="stat" id="stat"></div>
    <div class="toolbar">
      <button data-filter="all" class="active">All</button>
      <button data-filter="todo">To-do</button>
      <button data-filter="done">Done</button>
      <span style="flex:1"></span>
      <button id="export">Export progress</button>
      <button id="import">Import</button>
      <button id="reset">Reset</button>
      <input type="file" id="file" accept="application/json" class="hidden" />
    </div>
  </div>
</header>
<main class="wrap" id="app"></main>
<footer id="foot"></footer>

<script src="data.js"></script>
<script>
(function(){
  var KEY = "iprep.progress.v1";
  var R = window.ROADMAP || {sections:[]};
  var filter = "all";
  var progress = load();

  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
  function save(){ localStorage.setItem(KEY, JSON.stringify(progress)); }

  document.getElementById("title").textContent = R.title || "Roadmap";
  document.getElementById("subtitle").textContent = R.subtitle || "";

  function allItems(){ return R.sections.reduce(function(a,s){ return a.concat(s.items); }, []); }

  function render(){
    var app = document.getElementById("app");
    app.innerHTML = "";
    R.sections.forEach(function(sec){
      var total = sec.items.length;
      var done = sec.items.filter(function(i){ return progress[i.id]; }).length;
      var visible = sec.items.filter(function(i){
        if(filter==="done") return progress[i.id];
        if(filter==="todo") return !progress[i.id];
        return true;
      });
      var el = document.createElement("section");
      el.className = "section";
      var pctSec = total ? Math.round(done/total*100) : 0;
      el.innerHTML =
        '<div class="shead"><h2>'+esc(sec.title)+'</h2>'+
        '<span class="sprog">'+done+'/'+total+' · '+pctSec+'%</span></div>'+
        '<div class="goal">'+esc(sec.goal||"")+'</div>'+
        '<div class="minibar"><div class="minifill" style="width:'+pctSec+'%"></div></div>';
      visible.forEach(function(it){
        var done = !!progress[it.id];
        var row = document.createElement("div");
        row.className = "item"+(done?" done":"");
        var titleHtml = it.url ? '<a href="'+esc(it.url)+'" target="_blank" rel="noopener">'+esc(it.title)+' ↗</a>' : esc(it.title);
        row.innerHTML =
          '<input type="checkbox" class="cb" '+(done?"checked":"")+' data-id="'+esc(it.id)+'">'+
          '<div class="body"><div class="title">'+titleHtml+'</div>'+
          '<div class="meta">'+
            '<span class="badge b-'+esc(it.type||"article")+'">'+esc(it.type||"")+'</span>'+
            (it.provider?'<span>'+esc(it.provider)+'</span>':'')+
            (it.hours?'<span>~'+it.hours+'h</span>':'')+
          '</div>'+
          (it.note?'<div class="note">'+esc(it.note)+'</div>':'')+
          '</div>';
        el.appendChild(row);
      });
      app.appendChild(el);
    });
    updateOverall();
  }

  function updateOverall(){
    var items = allItems();
    var total = items.length;
    var done = items.filter(function(i){ return progress[i.id]; }).length;
    var pct = total ? Math.round(done/total*100) : 0;
    var hoursLeft = items.filter(function(i){ return !progress[i.id]; })
                         .reduce(function(a,i){ return a + (i.hours||0); }, 0);
    document.getElementById("pfill").style.width = pct+"%";
    document.getElementById("pct").textContent = pct+"%";
    document.getElementById("stat").textContent =
      done+" of "+total+" items complete · ~"+hoursLeft+"h of curated learning remaining";
    document.getElementById("foot").textContent =
      "Interview Prep Roadmap · progress stored locally in your browser" + (R.updated? " · content updated "+R.updated : "");
  }

  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  document.addEventListener("change", function(e){
    if(e.target.classList.contains("cb")){
      var id = e.target.getAttribute("data-id");
      if(e.target.checked) progress[id]=true; else delete progress[id];
      save();
      e.target.closest(".item").classList.toggle("done", e.target.checked);
      render();
    }
  });

  document.querySelectorAll("[data-filter]").forEach(function(b){
    b.addEventListener("click", function(){
      filter = b.getAttribute("data-filter");
      document.querySelectorAll("[data-filter]").forEach(function(x){x.classList.remove("active");});
      b.classList.add("active");
      render();
    });
  });

  document.getElementById("reset").addEventListener("click", function(){
    if(confirm("Reset all progress? This clears your checkmarks.")){ progress={}; save(); render(); }
  });
  document.getElementById("export").addEventListener("click", function(){
    var blob = new Blob([JSON.stringify(progress,null,2)], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "interview-prep-progress.json"; a.click();
  });
  document.getElementById("import").addEventListener("click", function(){ document.getElementById("file").click(); });
  document.getElementById("file").addEventListener("change", function(e){
    var f = e.target.files[0]; if(!f) return;
    var r = new FileReader();
    r.onload = function(){ try{ progress = JSON.parse(r.result)||{}; save(); render(); }
      catch(err){ alert("Invalid progress file."); } };
    r.readAsText(f);
  });

  render();
})();
</script>
</body>
</html>
